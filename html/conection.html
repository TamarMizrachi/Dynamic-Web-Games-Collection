<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conection</title>
    <link rel="stylesheet" href="../css/conection.css">

    <nav>
        <span class="a-nav" id="nav-name">Hi!</span>
        <a href="../main.html" class="a-nav" id="">Home page</a>
        <img src="../files/logo.jpg" id="logo" alt="logo">
     </nav>
</head>

<body>

    <button id="logInButton">Log In</button>
    <button id="signUpButton">Sign Up</button>

    <div id="sign_up" class="">
    
    <form id="sign_up_form">
        <p>Sign up 👇</p>
        <input id="name" type="text" placeholder="Name" required />
        <input id="email" type="email" placeholder="Email" required />
        <input id="phone" type="tel" placeholder="Phone" required />
        <input id="password" type="password" placeholder="password" required />
        <button class="submit" type="submit">Sign Up</button>
    </form>
    </div>

    <div id="log_in" class="">
    
    <form id="log_in_form">
        <p>Log in 👇</p>
        <input id="login_email" type="email" placeholder="Email" required />
        <input id="login_password" type="password" placeholder="password" required />
        <button class="submit" type="submit">Log In</button>
    </form>
    </div>
</body>

<script src="../java script/conection.js"></script>
</html>
